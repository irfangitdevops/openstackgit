services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ADSENSE_CLIENT_ID: ${NEXT_PUBLIC_ADSENSE_CLIENT_ID}
    image: openstackgit:latest
    container_name: openstackgit-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3200:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Optional: raises GitHub API limit for /downloads tool pages (on-demand ISR).
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # SMTP for the Contact form / chatbox / lead popup.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL:-}
      # Optional WhatsApp lead notifications via CallMeBot.
      WHATSAPP_PHONE: ${WHATSAPP_PHONE:-}
      CALLMEBOT_API_KEY: ${CALLMEBOT_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: openstackgit-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      web:
        condition: service_healthy
